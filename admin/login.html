<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — MLBB Tournament Hub</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">
  <div id="particles-bg"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon large"><i class="fas fa-shield-alt"></i></div>
        <h1>Admin Portal</h1>
        <p>MLBB Tournament Hub</p>
      </div>
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <div class="form-group">
          <label><i class="fab fa-github"></i> GitHub Token <span class="label-hint">(for database access)</span></label>
          <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx" required>
          <small class="form-hint">Your GitHub Personal Access Token with repo write access. <a href="https://github.com/settings/tokens" target="_blank">Get one here</a></small>
        </div>
        <div class="form-group">
          <label><i class="fas fa-database"></i> GitHub Repo <span class="label-hint">(owner/repo)</span></label>
          <input type="text" id="githubRepo" placeholder="yourname/mlbb-tournament-data">
          <small class="form-hint">Leave blank to use default from config.</small>
        </div>
        <div id="loginError" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn-primary full-width">
          <i class="fas fa-sign-in-alt"></i> Login to Admin
        </button>
      </form>
      <div class="auth-footer">
        <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Site</a>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/github-db.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const token = document.getElementById('githubToken').value.trim();
      const repoInput = document.getElementById('githubRepo').value.trim();
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';

      // Simple local auth check
      if (username !== ADMIN_CONFIG.username || password !== ADMIN_CONFIG.password) {
        errEl.textContent = 'Invalid username or password.';
        errEl.style.display = 'block';
        return;
      }
      if (!token) {
        errEl.textContent = 'GitHub token is required.';
        errEl.style.display = 'block';
        return;
      }

      // Save session
      sessionStorage.setItem('adminAuth', '1');
      sessionStorage.setItem('ghToken', token);
      if (repoInput) sessionStorage.setItem('ghRepo', repoInput);

      window.location.href = 'dashboard.html';
    });
  </script>
</body>
  </html>
