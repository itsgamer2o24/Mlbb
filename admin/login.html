<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — MLBB Tournament Hub</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-mark"><i class="fas fa-shield-alt"></i></div>
      <h1>Admin Portal</h1>
      <p>MLBB Tournament Hub</p>
    </div>
    <div class="err-box" id="err"></div>
    <div class="fg"><label><i class="fas fa-user"></i> Username</label><input type="text" id="u" placeholder="admin" autocomplete="username"></div>
    <div class="fg"><label><i class="fas fa-lock"></i> Password</label><input type="password" id="p" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="fg">
      <label><i class="fab fa-github"></i> GitHub Token</label>
      <input type="password" id="tok" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <small>Needs <strong style="color:var(--text)">repo</strong> scope. <a href="https://github.com/settings/tokens/new?scopes=repo&description=mlbb-admin" target="_blank">Generate here ↗</a></small>
    </div>
    <div class="fg">
      <label><i class="fas fa-database"></i> GitHub Repo <span style="font-weight:400;text-transform:none;font-size:10px;color:var(--muted)">(blank = use config)</span></label>
      <input type="text" id="repo" placeholder="e.g. itsgamer2o24/Mlbb">
    </div>
    <button class="btn btn-gold btn-full" id="loginBtn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login to Admin</button>
    <div style="text-align:center;margin-top:18px"><a href="../index.html" style="color:var(--muted);font-size:13px;font-weight:700;letter-spacing:.5px"><i class="fas fa-arrow-left"></i> Back to Site</a></div>
  </div>
</div>
<script src="../js/config.js"></script>
<script>
function doLogin(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  var tok=document.getElementById('tok').value.trim();
  var repo=document.getElementById('repo').value.trim();
  var err=document.getElementById('err');
  var btn=document.getElementById('loginBtn');
  err.style.display='none';
  var cu=(typeof ADMIN_USER!=='undefined')?ADMIN_USER:'admin';
  var cp=(typeof ADMIN_PASS!=='undefined')?ADMIN_PASS:'admin123';
  if(!u||!p){err.textContent='Enter username and password.';err.style.display='block';return;}
  if(u!==cu){err.textContent='Wrong username. Check js/config.js';err.style.display='block';return;}
  if(p!==cp){err.textContent='Wrong password. Check js/config.js';err.style.display='block';return;}
  if(!tok){err.textContent='GitHub token is required.';err.style.display='block';return;}
  sessionStorage.setItem('adminAuth','1');
  sessionStorage.setItem('token',tok);
  sessionStorage.setItem('repo',repo||(typeof GITHUB_REPO!=='undefined'?GITHUB_REPO:''));
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Logging in...';
  setTimeout(function(){window.location.href='dashboard.html';},400);
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
</body></html>
