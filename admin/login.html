<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — MLBB Tournament Hub</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-container{width:100%;max-width:440px;position:relative;z-index:1}
.auth-card{background:#111827;border:1px solid #1e2d4a;border-radius:16px;padding:36px;box-shadow:0 4px 40px rgba(0,0,0,0.6)}
.auth-logo{text-align:center;margin-bottom:28px}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#FFD700,#ff9800);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#000;margin:0 auto 12px;box-shadow:0 0 20px rgba(255,215,0,0.3)}
.auth-logo h1{font-family:'Orbitron',monospace;font-size:22px;color:#e8eaf6;margin-bottom:4px}
.auth-logo p{color:#6b7db3;font-size:13px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;font-weight:700;color:#6b7db3;margin-bottom:7px;letter-spacing:1px;text-transform:uppercase}
.form-group input{width:100%;padding:10px 14px;background:rgba(0,0,0,0.4);border:1px solid #1e2d4a;border-radius:7px;color:#e8eaf6;font-size:14px;outline:none;font-family:'Exo 2',sans-serif;box-sizing:border-box}
.form-group input:focus{border-color:#FFD700}
.form-hint{display:block;margin-top:5px;font-size:11px;color:#3a4a6b}
.form-hint a{color:#4fc3f7}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#FFD700,#ff9800);color:#000;font-weight:700;font-size:14px;border:none;border-radius:7px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;font-family:'Exo 2',sans-serif}
.btn-login:hover{opacity:0.9}
.btn-login:disabled{opacity:0.6;cursor:not-allowed}
.error-box{background:rgba(229,57,53,0.12);border:1px solid rgba(229,57,53,0.4);color:#ef9a9a;padding:11px 14px;border-radius:7px;font-size:13px;margin-bottom:16px;display:none}
.back-link{text-align:center;margin-top:18px}
.back-link a{color:#6b7db3;font-size:13px;text-decoration:none}
.back-link a:hover{color:#FFD700}
</style>
</head>
<body>
<div id="particles-bg"></div>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
      <h1>Admin Portal</h1>
      <p>MLBB Tournament Hub</p>
    </div>
    <div class="error-box" id="errBox"></div>
    <div class="form-group">
      <label><i class="fas fa-user"></i> Username</label>
      <input type="text" id="iUser" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="iPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label><i class="fab fa-github"></i> GitHub Token</label>
      <input type="password" id="iToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <small class="form-hint">Needs <strong style="color:#e8eaf6">repo</strong> scope. <a href="https://github.com/settings/tokens/new?scopes=repo&description=mlbb-admin" target="_blank">Generate here</a></small>
    </div>
    <div class="form-group">
      <label><i class="fas fa-database"></i> GitHub Repo <span style="font-weight:400;text-transform:none;font-size:10px">(leave blank = use config)</span></label>
      <input type="text" id="iRepo" placeholder="e.g. itsgamer2o24/Mlbb">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> Login to Admin
    </button>
    <div class="back-link">
      <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Site</a>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/github-db.js"></script>
<script>
function showErr(msg) {
  var b = document.getElementById('errBox');
  b.textContent = msg;
  b.style.display = 'block';
}

function doLogin() {
  var user  = document.getElementById('iUser').value.trim();
  var pass  = document.getElementById('iPass').value;
  var token = document.getElementById('iToken').value.trim();
  var repo  = document.getElementById('iRepo').value.trim();
  var btn   = document.getElementById('loginBtn');

  document.getElementById('errBox').style.display = 'none';

  if (!user || !pass) { showErr('Enter username and password.'); return; }

  var cfgUser = (window.ADMIN_CONFIG && window.ADMIN_CONFIG.username) ? window.ADMIN_CONFIG.username : 'admin';
  var cfgPass = (window.ADMIN_CONFIG && window.ADMIN_CONFIG.password) ? window.ADMIN_CONFIG.password : 'admin123';

  if (user !== cfgUser) { showErr('Wrong username.'); return; }
  if (pass !== cfgPass) { showErr('Wrong password.'); return; }
  if (!token) { showErr('GitHub token is required.'); return; }

  sessionStorage.setItem('adminAuth', '1');
  sessionStorage.setItem('ghToken', token);
  sessionStorage.setItem('ghRepo', repo || (window.GITHUB_REPO || ''));

  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
  btn.disabled = true;

  setTimeout(function() {
    window.location.href = 'dashboard.html';
  }, 500);
}

// Allow Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
