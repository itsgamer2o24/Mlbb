<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournaments — MLBB Tournament Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="particles-bg"></div>
  <header class="main-header">
    <div class="header-glow"></div>
    <div class="container header-inner">
      <div class="logo-wrap">
        <div class="logo-icon"><i class="fas fa-trophy"></i></div>
        <div class="logo-text">
          <span class="logo-main">MLBB</span>
          <span class="logo-sub">TOURNAMENT HUB</span>
        </div>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
        <a href="tournaments.html" class="nav-link active"><i class="fas fa-gamepad"></i> Tournaments</a>
        <a href="leaderboard.html" class="nav-link"><i class="fas fa-crown"></i> Leaderboard</a>
        <a href="admin/login.html" class="nav-link nav-admin"><i class="fas fa-shield-alt"></i> Admin</a>
      </nav>
      <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
    </div>
  </header>
  <div class="mobile-nav" id="mobileNav">
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="tournaments.html"><i class="fas fa-gamepad"></i> Tournaments</a>
    <a href="leaderboard.html"><i class="fas fa-crown"></i> Leaderboard</a>
    <a href="admin/login.html"><i class="fas fa-shield-alt"></i> Admin</a>
  </div>

  <div class="page-hero">
    <div class="container">
      <h1 class="page-title"><i class="fas fa-gamepad"></i> All Tournaments</h1>
      <p class="page-sub">Find your next battleground</p>
    </div>
  </div>

  <section class="section-content">
    <div class="container">
      <!-- Filters -->
      <div class="filters-bar">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="ongoing">Ongoing</button>
          <button class="filter-btn" data-filter="upcoming">Upcoming</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search tournaments...">
        </div>
      </div>

      <!-- Tournament Grid -->
      <div class="tournaments-grid" id="tournamentsList">
        <div class="loading-state"><div class="spinner"></div><p>Loading tournaments...</p></div>
      </div>
    </div>
  </section>

  <footer class="main-footer">
    <div class="container footer-inner">
      <div class="footer-logo"><i class="fas fa-trophy"></i><span>MLBB Tournament Hub</span></div>
      <p class="footer-copy">© 2025 MLBB Tournament Hub. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/github-db.js"></script>
  <script src="js/tournaments.js"></script>
</body>
</html>
